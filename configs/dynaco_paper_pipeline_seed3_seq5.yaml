# DyNACO training on GFAs generated by the paper data pipeline.
#
# The corpus was generated with:
#   scripts/generate_paper_pipeline_gfa_corpus.py --run --seeds 3 --test-sequences 5 --annotators mg,km,ga

# Current dense-QUBO training uses the <=30-segment paper-pipeline subset.
# Full paper-pipeline lists are also available in the same metadata directory.
train_list:
  - results/paper_pipeline_gfa_corpus/seed3_seq5_mg_km_ga/metadata/train.le30.txt
test_list:
  - results/paper_pipeline_gfa_corpus/seed3_seq5_mg_km_ga/metadata/test.le30.txt

generate_synthetic_train: 0
generate_synthetic_test: 0

copy_numbers: sc
penalties: 200,50,1
alpha_qubo: 1.1

epochs: 10
instances_per_epoch: 16
H: 10
mini_H: 10
n_ants: 32
lr: 0.0005
alpha: 1.0
beta: 1.0
gamma: 1.0
rho: 0.1
elite_frac: 0.25
grad_clip: 1.0

units: 64
depth: 4
seed: 1
device: cuda

eval_time_limit: 2
no_aco_eval: false

out: results/dynaco_online/paper_pipeline_seed3_seq5.pt
