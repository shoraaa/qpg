# MG-specific DyNACO training with a walk-coverage proxy reward.
#
# This config mirrors dynaco_paper_pipeline_mg.yaml but is intended for
# train_walk_coverage_prior.py. The original QUBO-energy trainer remains
# available through train.py for direct comparison.

paper_pipeline_train: true
paper_pipeline_validation: true
paper_pipeline_cache_dir: results/dynaco_mg/paper_pipeline_cache_walk_coverage
paper_pipeline_annotators: mg
paper_pipeline_test_sequences: 5
paper_pipeline_shred_depth: 30
paper_pipeline_train_start_seed: 1
paper_pipeline_val_start_seed: 100001
paper_pipeline_min_train_instances: 32
paper_pipeline_val_instances: 32
paper_pipeline_fresh_epoch_instances: true
paper_pipeline_max_segments: 80
paper_pipeline_max_horizon: 300
paper_pipeline_index_horizon: false
paper_pipeline_generation_attempt_limit: 100

generate_synthetic_train: 0
generate_synthetic_test: 0

copy_numbers: paper
penalties: 200,50,1
alpha_qubo: 1.1

epochs: 10
instances_per_epoch: 32
H: 10
mini_H: 10
n_ants: 32
lr: 0.0005
alpha: 1.0
beta: 1.0
gamma: 1.0
rho: 0.1
elite_frac: 0.25
grad_clip: 1.0

units: 64
depth: 4
seed: 1
device: cuda

validate_every: 1
validate_limit: 16
validation_objective: gap_to_aco
save_epoch_checkpoints: true
skip_final_eval: true
eval_time_limit: 2
no_aco_eval: false

wandb: true
wandb_project: qpg-dynaco-mg
wandb_tags: walk_coverage_proxy
wandb_mode: online

out: results/dynaco_mg/paper_pipeline_mg_walk_coverage.pt
